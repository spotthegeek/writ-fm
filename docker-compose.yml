# Local development — bind-mounts live source, no image push needed.
# For production deployment use docker-stack.yml.
services:
  admin:
    build: .
    restart: unless-stopped
    working_dir: /code/writ-fm/admin
    command: python app.py
    ports:
      - "${WRIT_ADMIN_PORT:-8080}:8080"
    env_file: .env
    volumes:
      - ./output:/code/writ-fm/output
      - ./config:/code/writ-fm/config

  api:
    build: .
    restart: unless-stopped
    command: python station/api_server.py
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./output:/code/writ-fm/output
      - ./config:/code/writ-fm/config

  streamer:
    build: .
    restart: unless-stopped
    command: python station/stream_gapless.py
    env_file: .env
    volumes:
      - ./output:/code/writ-fm/output
      - ./config:/code/writ-fm/config
