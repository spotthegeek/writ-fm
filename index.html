<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRIT-FM</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --text-muted: #888888;
            --box-bg: #f9f9f9;
            --border-color: #eeeeee;
            --font-mono: 'Courier New', Courier, monospace;
            --font-serif: Georgia, 'Times New Roman', Times, serif;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --box-bg: #1e1e1e;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .header-left .title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            font-weight: normal;
        }

        .header-left .subtitle {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
        }

        .header-right {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .main-box {
            background-color: var(--box-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            position: relative;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
        }

        .status-dot.online {
            background-color: #4CAF50;
            box-shadow: 0 0 5px #4CAF50;
        }

        .host-info {
            font-family: var(--font-serif);
            font-style: italic;
        }

        .show-info {
            margin-bottom: 40px;
        }

        .transmission-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .show-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            margin: 0;
            font-weight: normal;
        }
        
        .track-title {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .controls-area {
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--text-color);
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            transition: all 0.2s;
        }

        .play-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .play-icon {
            margin-left: 4px;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid currentColor;
        }

        .pause-icon {
            display: flex;
            gap: 4px;
        }

        .pause-icon div {
            width: 4px;
            height: 18px;
            background-color: currentColor;
        }

        .volume-container {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-icon {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .volume-slider {
            width: 80px;
            accent-color: var(--text-muted);
        }

        .accordion {
            border-top: 1px solid var(--border-color);
        }

        .accordion-item {
            border-bottom: 1px solid var(--border-color);
        }

        .accordion-header {
            width: 100%;
            padding: 15px 0;
            background: none;
            border: none;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .accordion-header:hover {
            color: var(--text-color);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            font-family: var(--font-serif);
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .accordion-content.open {
            max-height: 400px;
            padding-bottom: 15px;
            overflow-y: auto;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* Message Form */
        #message-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #message-form textarea {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-family: var(--font-mono);
            box-sizing: border-box;
            resize: vertical;
        }
        #message-form button {
            align-self: flex-start;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 15px;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        #message-form button:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        
        #schedule-content {
            white-space: pre-wrap;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        
        @media (max-width: 500px) {
            .volume-container {
                position: static;
                margin-top: 20px;
            }
            .controls-area {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1 class="title">WRIT - FM</h1>
                <p class="subtitle">the frequency between frequencies</p>
            </div>
            <div class="header-right">
                <div class="clock-listeners">
                    <span id="clock">00:00</span> • <span id="listener-count">0</span>
                </div>
                <button class="theme-toggle" id="theme-btn">DARK MODE</button>
            </div>
        </header>

        <div class="main-box">
            <div class="box-header">
                <div class="status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">OFFLINE</span>
                </div>
                <div class="host-info">
                    Listener Hours · <span id="host-name">unknown</span>
                </div>
            </div>

            <div class="show-info">
                <div class="transmission-label">TRANSMISSION</div>
                <h2 class="show-title" id="show-title">Searching...</h2>
                <div class="track-title" id="track-title"></div>
            </div>

            <div class="controls-area">
                <button class="play-btn" id="play-btn" aria-label="Play">
                    <div class="play-icon" id="play-icon"></div>
                </button>

                <div class="volume-container">
                    <span class="volume-icon">🔊</span>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                </div>
            </div>
        </div>

        <div class="accordion">
            <div class="accordion-item">
                <button class="accordion-header">SEND A MESSAGE <span>+</span></button>
                <div class="accordion-content">
                    <form id="message-form">
                        <textarea rows="3" placeholder="Leave a message in the dark..." id="msg-text" required maxlength="280"></textarea>
                        <button type="submit">SEND</button>
                        <div id="msg-status" style="font-size: 0.8rem; margin-top: 5px;"></div>
                    </form>
                </div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header" id="schedule-btn">SCHEDULE <span>+</span></button>
                <div class="accordion-content">
                    <div id="schedule-content">Loading schedule...</div>
                </div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header">ABOUT <span>+</span></button>
                <div class="accordion-content">
                    <p>WRIT-FM is an autonomous, AI-driven internet radio station broadcasting talk segments, listener letters, and late-night philosophy.</p>
                </div>
            </div>
        </div>

        <footer>
            the signal persists
        </footer>
    </div>

    <audio id="audio-player" preload="none"></audio>

    <script>
        // API Endpoints
        // When served through HTTPS, talk back to the same public origin so
        // proxied deployments can route /now-playing and /stream consistently.
        const API_BASE = window.location.protocol === 'https:'
            ? window.location.origin
            : 'http://' + window.location.hostname + ':8001';
        const STREAM_URL = window.location.protocol === 'https:'
            ? window.location.origin + '/stream'
            : 'http://' + window.location.hostname + ':8000/stream';

        // Elements
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const volumeSlider = document.getElementById('volume-slider');
        const themeBtn = document.getElementById('theme-btn');
        const clockEl = document.getElementById('clock');
        const listenerCountEl = document.getElementById('listener-count');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const hostNameEl = document.getElementById('host-name');
        const showTitleEl = document.getElementById('show-title');
        const trackTitleEl = document.getElementById('track-title');
        const scheduleContent = document.getElementById('schedule-content');

        // State
        let isPlaying = false;
        let isOnline = false;

        // --- Theme Toggle ---
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.textContent = 'LIGHT MODE';
        }

        themeBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.textContent = 'DARK MODE';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.textContent = 'LIGHT MODE';
            }
        });

        // --- Clock ---
        setInterval(() => {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }, 1000);

        // --- Audio Player ---
        audio.src = STREAM_URL;
        audio.volume = volumeSlider.value;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                // To stop buffering completely on pause, we reset the src
                audio.src = '';
                audio.load();
                isPlaying = false;
                playIcon.className = 'play-icon';
                playIcon.innerHTML = '';
            } else {
                audio.src = STREAM_URL;
                audio.play().then(() => {
                    isPlaying = true;
                    playIcon.className = 'pause-icon';
                    playIcon.innerHTML = '<div></div><div></div>';
                }).catch(err => {
                    console.error('Error playing audio:', err);
                });
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // --- API Polling ---
        async function fetchNowPlaying() {
            try {
                const res = await fetch(`${API_BASE}/now-playing`);
                if (!res.ok) throw new Error('Not OK');
                const data = await res.json();
                
                if (!isOnline) {
                    isOnline = true;
                    statusDot.classList.add('online');
                    statusText.textContent = 'ONLINE';
                }

                listenerCountEl.textContent = data.listeners || 0;
                hostNameEl.textContent = data.host || 'unknown';
                showTitleEl.textContent = data.show || 'Automated Broadcast';
                trackTitleEl.textContent = data.track ? `Now Playing: ${data.track}` : '';

            } catch (err) {
                if (isOnline) {
                    isOnline = false;
                    statusDot.classList.remove('online');
                    statusText.textContent = 'OFFLINE';
                    listenerCountEl.textContent = 0;
                }
            }
        }

        setInterval(fetchNowPlaying, 5000);
        fetchNowPlaying(); // Initial fetch

        // --- Accordions ---
        document.querySelectorAll('.accordion-header').forEach(button => {
            button.addEventListener('click', () => {
                const content = button.nextElementSibling;
                const span = button.querySelector('span');
                if (content.classList.contains('open')) {
                    content.classList.remove('open');
                    span.textContent = '+';
                } else {
                    // Close others
                    document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
                    document.querySelectorAll('.accordion-header span').forEach(s => s.textContent = '+');
                    
                    content.classList.add('open');
                    span.textContent = '-';
                }
            });
        });

        // --- Schedule ---
        document.getElementById('schedule-btn').addEventListener('click', async () => {
            if (scheduleContent.textContent.includes('Loading')) {
                try {
                    const res = await fetch(`${API_BASE}/schedule`);
                    const data = await res.json();
                    if (data.upcoming && data.upcoming.length > 0) {
                        scheduleContent.innerHTML = data.upcoming.map(s => 
                            `<strong>${s.starts_around}</strong> - ${s.name}<br><span style="color:var(--text-muted);font-size:0.8em">${s.topic_focus}</span>`
                        ).join('<br><br>');
                    } else {
                        scheduleContent.textContent = "No upcoming schedule available.";
                    }
                } catch (err) {
                    scheduleContent.textContent = "Failed to load schedule.";
                }
            }
        });

        // --- Message Form ---
        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('msg-text');
            const statusEl = document.getElementById('msg-status');
            const text = msgEl.value.trim();
            
            if (!text) return;
            
            try {
                statusEl.textContent = 'Sending...';
                statusEl.style.color = 'var(--text-muted)';
                const res = await fetch(`${API_BASE}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                if (res.ok) {
                    msgEl.value = '';
                    statusEl.textContent = 'Message transmitted into the dark.';
                    statusEl.style.color = '#4CAF50';
                } else {
                    const err = await res.json();
                    statusEl.textContent = err.error || 'Transmission failed.';
                    statusEl.style.color = 'red';
                }
            } catch (err) {
                statusEl.textContent = 'Transmission failed. Are we offline?';
                statusEl.style.color = 'red';
            }
        });
    </script>
</body>
</html>
