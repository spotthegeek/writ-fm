show_types:
  research:
    name: Research Based
    description: Curated editorial shows driven by topic focus and prompt research.
    uses_topic_focus: true
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - deep_dive
    - interview
    - story
  hybrid:
    name: Hybrid
    description: Research-led shows that can also ingest Reddit, YouTube, or web sources.
    uses_topic_focus: true
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - deep_dive
    - interview
    - panel
    - reddit_post
    - youtube
  content_ingest:
    name: Content Ingest
    description: Feed-driven shows that pull from Reddit, YouTube, and other source
      rules.
    uses_topic_focus: false
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - reddit_post
    - reddit_storytelling
    - youtube
  music_first:
    name: Music First
    description: Mostly music bumpers and short IDs, with occasional editorial inserts.
    uses_topic_focus: false
    uses_source_rules: false
    uses_bumper_style: true
    default_segment_types:
    - station_id
    - show_intro
    - show_outro
  live_community:
    name: Live / Community
    description: Listener-facing and conversational shows with lighter automation.
    uses_topic_focus: false
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - listener_mailbag
    - panel
    - interview
  news_current_events:
    name: News / Current Events
    description: Source-driven current events shows built from the latest feeds and
      posts.
    uses_topic_focus: false
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - news_analysis
    - deep_dive
    - panel
  listener_driven:
    name: Listener Driven
    description: Shows built from listener prompts, calls, mailbag letters, and feedback.
    uses_topic_focus: false
    uses_source_rules: true
    uses_bumper_style: true
    default_segment_types:
    - listener_mailbag
    - listener_response
    - interview
topic_focuses:
- philosophy
- night_philosophy
- music_history
- current_events
- soul_music
- culture
- listeners
- technology
- horror
- sci-fi
bumper_styles:
- ambient
- jazz
- soul
- downtempo
- indie
- electronic
- folk
- rock
- pop
source_types:
- id: url
  name: Web URL
  category: web
- id: reddit_subreddit
  name: Reddit Subreddit
  category: reddit
- id: reddit_thread
  name: Reddit Thread
  category: reddit
- id: youtube_channel
  name: YouTube Channel
  category: youtube
- id: youtube_playlist
  name: YouTube Playlist
  category: youtube
- id: youtube_video
  name: YouTube Video
  category: youtube
- id: rss
  name: RSS Feed
  category: feed
