// ─── ON-DEMAND SCREEN ─────────────────────────────────────────────────────────
const OnDemandScreen = ({ t }) => {
  const [cfg, setCfg] = useState(null);
  const [absUrl, setAbsUrl] = useState("");
  const [allLibraries, setAllLibraries] = useState([]);
  const [selectedLibIds, setSelectedLibIds] = useState([]);
  const [pingStatus, setPingStatus] = useState(null); // null | "ok" | "fail"
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [fetchingLibs, setFetchingLibs] = useState(false);
  const [uploads, setUploads] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadFile, setUploadFile] = useState(null);
  const [uploadTitle, setUploadTitle] = useState("");
  const [uploadSource, setUploadSource] = useState("news");
  const [uploadSubtitle, setUploadSubtitle] = useState("");
  const [uploadMsg, setUploadMsg] = useState("");

  const loadConfig = async () => {
    try {
      const c = await api("GET", "/api/ondemand/config");
      setCfg(c);
      setAbsUrl(c.abs?.base_url || "");
      setSelectedLibIds((c.abs?.libraries || []).map(l => l.id));
    } catch(e) {}
  };

  const loadUploads = async () => {
    try {
      const d = await api("GET", "/api/ondemand/uploads");
      setUploads(d.items || []);
    } catch(e) {}
  };

  useEffect(() => { loadConfig(); loadUploads(); }, []);

  const fetchLibraries = async () => {
    setFetchingLibs(true);
    try {
      const d = await api("GET", "/api/ondemand/abs/libraries");
      setAllLibraries(d.libraries || []);
    } catch(e) { alert("Could not fetch libraries: " + e.message); }
    finally { setFetchingLibs(false); }
  };

  const pingAbs = async () => {
    setPingStatus(null);
    try {
      const d = await api("GET", "/api/ondemand/abs/ping");
      setPingStatus(d.ok ? "ok" : "fail");
    } catch(e) { setPingStatus("fail"); }
  };

  const toggleLib = (lib) => {
    setSelectedLibIds(prev =>
      prev.includes(lib.id) ? prev.filter(id => id !== lib.id) : [...prev, lib.id]
    );
    if (!allLibraries.find(l => l.id === lib.id)) {
      setAllLibraries(prev => [...prev, lib]);
    }
  };

  const saveConfig = async () => {
    setSaving(true);
    try {
      const selectedLibs = allLibraries
        .filter(l => selectedLibIds.includes(l.id))
        .map(l => ({ id: l.id, name: l.name }));
      await api("POST", "/api/ondemand/config", {
        abs: { base_url: absUrl, libraries: selectedLibs },
        upload_sources: cfg?.upload_sources || [],
      });
      setSaved(true); setTimeout(() => setSaved(false), 2500);
    } catch(e) { alert(e.message); }
    finally { setSaving(false); }
  };

  const deleteUpload = async (id) => {
    if (!confirm("Delete this item?")) return;
    try {
      await api("DELETE", `/api/ondemand/uploads/${encodeURIComponent(id)}`);
      loadUploads();
    } catch(e) { alert(e.message); }
  };

  const doUpload = async () => {
    if (!uploadFile) return;
    setUploading(true);
    setUploadMsg("");
    try {
      const fd = new FormData();
      fd.append("audio", uploadFile);
      fd.append("source", uploadSource);
      fd.append("title", uploadTitle || uploadFile.name);
      fd.append("subtitle", uploadSubtitle);
      const resp = await fetch("/api/ondemand/upload", { method: "POST", body: fd });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || "Upload failed"); }
      setUploadMsg("Uploaded successfully.");
      setUploadFile(null); setUploadTitle(""); setUploadSubtitle("");
      loadUploads();
    } catch(e) { setUploadMsg("Error: " + e.message); }
    finally { setUploading(false); }
  };

  const fmtDur = s => {
    if (!s) return "—";
    const m = Math.floor(s / 60), sec = Math.round(s % 60);
    return `${m}:${String(sec).padStart(2, "0")}`;
  };

  const uploadSources = cfg?.upload_sources || [];
  const ingestKey = "Set WRIT_INGEST_API_KEY env var";

  return (
    <div style={{ padding: 24, overflowY: "auto", height: "100%" }}>
      <ScreenHeader t={t} title="On-Demand" subtitle="Configure content sources for the listener on-demand library"
        action={<button onClick={saveConfig} disabled={saving}
          style={{ padding: "7px 16px", borderRadius: 7, border: "none",
            background: saved ? "#22c55e" : t.accent, color: "#fff", fontSize: 13,
            fontWeight: 500, cursor: saving ? "default" : "pointer",
            fontFamily: "'DM Sans',sans-serif", transition: "background 0.2s" }}>
          {saved ? "✓ Saved" : saving ? "Saving…" : "Save Config"}
        </button>} />

      <div style={{ maxWidth: 640, display: "flex", flexDirection: "column", gap: 18 }}>

        {/* ABS Source */}
        <Card t={t} style={{ padding: "18px 20px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>
            Audiobookshelf Source
          </div>
          <div style={{ marginBottom: 12 }}>
            <Label t={t}>Server URL</Label>
            <div style={{ display: "flex", gap: 8 }}>
              <Input t={t} value={absUrl} onChange={e => setAbsUrl(e.target.value)} placeholder="https://abs.example.com" style={{ flex: 1 }} />
              <button onClick={pingAbs} style={{ padding: "7px 14px", borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent",
                color: t.text, cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans',sans-serif", whiteSpace: "nowrap" }}>
                Test
              </button>
            </div>
            {pingStatus === "ok" && <div style={{ fontSize: 12, color: t.pillReadyText, marginTop: 5 }}>✓ Connected</div>}
            {pingStatus === "fail" && <div style={{ fontSize: 12, color: t.dangerText, marginTop: 5 }}>✗ Could not connect — check URL and WRIT_ABS_API_KEY</div>}
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <Label t={t}>Exposed Libraries</Label>
              <button onClick={fetchLibraries} disabled={fetchingLibs}
                style={{ fontSize: 12, padding: "4px 10px", borderRadius: 6, border: `1px solid ${t.border}`,
                  background: "transparent", color: t.textMuted, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                {fetchingLibs ? "Loading…" : "Fetch from ABS"}
              </button>
            </div>
            {allLibraries.length === 0
              ? <div style={{ fontSize: 13, color: t.textFaint }}>Click "Fetch from ABS" to see available libraries.</div>
              : allLibraries.map(lib => (
                <label key={lib.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", cursor: "pointer", fontSize: 13, color: t.text }}>
                  <input type="checkbox" checked={selectedLibIds.includes(lib.id)}
                    onChange={() => toggleLib(lib)} style={{ accentColor: t.accent }} />
                  <span>{lib.name}</span>
                  {lib.media_type && <span style={{ fontSize: 11, color: t.textFaint }}>({lib.media_type})</span>}
                </label>
              ))
            }
            {/* Show already-selected libs even if not fetched yet */}
            {allLibraries.length === 0 && selectedLibIds.length > 0 && (cfg?.abs?.libraries || []).map(lib => (
              <label key={lib.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", cursor: "pointer", fontSize: 13, color: t.text }}>
                <input type="checkbox" checked readOnly style={{ accentColor: t.accent }} />
                <span>{lib.name}</span>
              </label>
            ))}
          </div>
        </Card>

        {/* Uploaded Content */}
        <Card t={t} style={{ padding: "18px 20px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>
            Uploaded Content
          </div>
          {uploads.length === 0
            ? <div style={{ fontSize: 13, color: t.textFaint, marginBottom: 16 }}>No uploaded items yet.</div>
            : <div style={{ marginBottom: 16 }}>
                {uploads.map(item => (
                  <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
                    borderBottom: `1px solid ${t.border}`, fontSize: 13 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 500, color: t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</div>
                      <div style={{ fontSize: 11.5, color: t.textMuted }}>{item.source_name} · {fmtDur(item.duration_seconds)}</div>
                    </div>
                    <button onClick={() => deleteUpload(item.id)}
                      style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${t.border}`, background: "transparent",
                        color: t.dangerText, cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>
                      Delete
                    </button>
                  </div>
                ))}
              </div>}
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 10 }}>Manual Upload</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div>
              <Label t={t}>Audio File</Label>
              <input type="file" accept="audio/*" onChange={e => setUploadFile(e.target.files[0])}
                style={{ fontSize: 13, color: t.text, fontFamily: "'DM Sans',sans-serif" }} />
            </div>
            <div>
              <Label t={t}>Title</Label>
              <Input t={t} value={uploadTitle} onChange={e => setUploadTitle(e.target.value)} placeholder="Episode title" />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <Label t={t}>Source Category</Label>
                <Select t={t} value={uploadSource} onChange={e => setUploadSource(e.target.value)}>
                  {uploadSources.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </Select>
              </div>
              <div style={{ flex: 1 }}>
                <Label t={t}>Subtitle (optional)</Label>
                <Input t={t} value={uploadSubtitle} onChange={e => setUploadSubtitle(e.target.value)} placeholder="Author / show" />
              </div>
            </div>
            <div>
              <button onClick={doUpload} disabled={!uploadFile || uploading}
                style={{ padding: "7px 16px", borderRadius: 7, border: "none", background: t.accent, color: "#fff",
                  fontSize: 13, fontWeight: 500, cursor: (!uploadFile || uploading) ? "default" : "pointer",
                  fontFamily: "'DM Sans',sans-serif", opacity: (!uploadFile || uploading) ? 0.6 : 1 }}>
                {uploading ? "Uploading…" : "Upload"}
              </button>
              {uploadMsg && <span style={{ marginLeft: 12, fontSize: 13, color: uploadMsg.startsWith("Error") ? t.dangerText : t.pillReadyText }}>{uploadMsg}</span>}
            </div>
          </div>
        </Card>

        {/* Agent Ingest */}
        <Card t={t} style={{ padding: "18px 20px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>
            Agent / Automated Ingest
          </div>
          <p style={{ fontSize: 13, color: t.textMuted, marginBottom: 14 }}>
            Other AI agents can push audio content via HTTP upload or by dropping files into the inbox directory.
          </p>
          <div style={{ marginBottom: 14 }}>
            <Label t={t}>HTTP Upload Endpoint</Label>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, background: t.logBg, color: t.logText, padding: "8px 12px", borderRadius: 7, wordBreak: "break-all" }}>
              POST http://&lt;host&gt;:8080/api/ondemand/upload<br/>
              Authorization: Bearer $WRIT_INGEST_API_KEY<br/>
              Content-Type: multipart/form-data<br/>
              Fields: audio (file), source (news|misc), title, subtitle
            </div>
          </div>
          <div>
            <Label t={t}>Inbox Drop Directory</Label>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, background: t.logBg, color: t.logText, padding: "8px 12px", borderRadius: 7 }}>
              output/ondemand/inbox/<br/>
              Drop: &lt;name&gt;.mp3 + &lt;name&gt;.json<br/>
              JSON: {"{"}"source":"news","title":"…","subtitle":"…"{"}"}
            </div>
            <div style={{ fontSize: 12, color: t.textFaint, marginTop: 6 }}>
              Inbox is scanned automatically when the listener app refreshes its inventory.
            </div>
          </div>
        </Card>

      </div>
    </div>
  );
};

const SettingsScreen = ({ t }) => {
  const [settingsData] = useApi("/api/settings");
  const [taxonomy, , , reloadTaxonomy] = useApi("/api/show-taxonomy");
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ station_name: "", timezone: "" });
  const [bumperStyles, setBumperStyles] = useState([]);

  useEffect(() => { if (settingsData) setForm({ station_name: settingsData.station_name || "", timezone: settingsData.timezone || "" }); }, [settingsData]);
  useEffect(() => { if (taxonomy) setBumperStyles(taxonomy.bumper_styles || []); }, [taxonomy]);

  const save = async () => {
    setSaving(true);
    try {
      await api("PUT", "/api/settings", { station_name: form.station_name, timezone: form.timezone });
      await api("PUT", "/api/show-taxonomy", { bumper_styles: bumperStyles });
      reloadTaxonomy();
      setSaved(true); setTimeout(() => setSaved(false), 2500);
    } catch (e) { alert(e.message); }
    finally { setSaving(false); }
  };

  return (
    <div style={{ padding: 24, overflowY: "auto", height: "100%" }}>
      <ScreenHeader t={t} title="Settings" subtitle="Station identity and global configuration"
        action={<button onClick={save} disabled={saving} style={{ padding: "7px 16px", borderRadius: 7, border: "none", background: saved ? "#22c55e" : t.accent, color: "#fff", fontSize: 13, fontWeight: 500, cursor: saving ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif", transition: "background 0.2s" }}>
          {saved ? "✓ Saved" : saving ? "Saving…" : "Save Settings"}
        </button>} />
      <div style={{ maxWidth: 540, display: "flex", flexDirection: "column", gap: 14 }}>
        <Card t={t} style={{ padding: "18px 20px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>Station Identity</div>
          <div style={{ marginBottom: 12 }}><Label t={t}>Station Name</Label><Input t={t} value={form.station_name} onChange={e => setForm(f => ({ ...f, station_name: e.target.value }))} /></div>
          <div><Label t={t}>Station Timezone</Label>
            <Input t={t} value={form.timezone} onChange={e => setForm(f => ({ ...f, timezone: e.target.value }))} placeholder="Australia/Adelaide" />
            <div style={{ fontSize: 11.5, color: t.textFaint, marginTop: 6 }}>IANA timezone identifier — e.g. <code style={{ fontFamily: "'DM Mono',monospace", background: t.border, padding: "1px 5px", borderRadius: 4 }}>Australia/Adelaide</code></div>
          </div>
        </Card>
        <Card t={t} style={{ padding: "18px 20px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 6 }}>Bumper Styles</div>
          <p style={{ fontSize: 12.5, color: t.textMuted, marginBottom: 14 }}>Mood tags used when selecting bumper styles for a show.</p>
          <BumperStylesEditor t={t} styles={bumperStyles} setStyles={setBumperStyles} />
        </Card>
        {saved && <div style={{ fontSize: 13, color: t.pillReadyText, background: t.pillReady, padding: "8px 14px", borderRadius: 8 }}>Settings saved successfully.</div>}
      </div>
    </div>
  );
};

// ─── PLACEHOLDER ──────────────────────────────────────────────────────────────
const PlaceholderScreen = ({ t, title }) => (
  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 10, color: t.textFaint }}>
    <div style={{ fontSize: 16, fontWeight: 500, color: t.textMuted }}>{title}</div>
    <div style={{ fontSize: 13 }}>Coming soon.</div>
  </div>
);

// ─── SIDEBAR + SHELL ──────────────────────────────────────────────────────────
const NavItem = ({ item, active, t, onClick }) => {
  const [h, setH] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "7px 12px", borderRadius: 7,
        border: "none", cursor: "pointer", textAlign: "left", fontFamily: "'DM Sans', sans-serif",
        background: active ? t.navActiveBg : h ? t.rowHover : "transparent",
        color: active ? t.navActiveText : t.navText,
        fontSize: 13.5, fontWeight: active ? 600 : 400, transition: "all 0.1s" }}>
      <Ico d={item.icon} size={14} />
      <span>{item.label}</span>
      {item.live && <span style={{ marginLeft: "auto", width: 6, height: 6, borderRadius: "50%", background: t.accent, flexShrink: 0, boxShadow: `0 0 6px ${t.accent}` }} />}
    </button>
  );
};

const AdminShell = () => {
  const [dark, setDark] = useState(() => localStorage.getItem("crouchfm_dark") === "1");
  const [nav, setNav] = useState("dashboard");
  const t = dark ? T.dark : T.light;
  const [elapsed, setElapsed] = useState(0);
  const [npTitle, setNpTitle] = useState("—");
  const [npShow, setNpShow] = useState("");
  const [npTopic, setNpTopic] = useState("");
  const [npType, setNpType] = useState("talk");
  const [npTotal, setNpTotal] = useState(0);
  const [npStartedAt, setNpStartedAt] = useState(null);
  const [statusMsg, setStatusMsg] = useState("Ready");
  const [statusType, setStatusType] = useState("idle");
  const [shows, setShows] = useState(null);
  const [icecastOk, setIcecastOk] = useState(false);
  const [streamerOk, setStreamerOk] = useState(false);
  const [listening, setListening] = useState(false);
  const audioRef = useRef(null);

  const streamUrl = `http://${window.location.hostname}:8000/stream`;

  const toggleListen = () => {
    if (!audioRef.current) return;
    if (listening) {
      audioRef.current.pause();
      audioRef.current.src = "";
      setListening(false);
    } else {
      audioRef.current.src = streamUrl;
      audioRef.current.play().catch(() => {});
      setListening(true);
    }
  };

  const setStatus = (msg, type = "idle") => { setStatusMsg(msg); setStatusType(type); };

  const reloadShows = useCallback(() => {
    fetch("/api/shows").then(r => r.json()).then(setShows).catch(() => {});
  }, []);

  const refreshStatus = useCallback(() => {
    Promise.all([
      fetch("/api/status").then(r => r.json()),
      fetch("/api/live/status").then(r => r.json()),
    ]).then(([d, live]) => {
      setIcecastOk(!!d.icecast);
      setStreamerOk(!!d.streamer);
      const np = d.now_playing || {};
      const type = np.type || "talk";
      setNpType(type);
      setNpTitle(np.track || np.title || "—");
      setNpShow(np.show || "");
      // now_playing.duration and .timestamp are set right before pipe_track for
      // every segment type — most accurate source for all types.
      if (np.duration) setNpTotal(Math.round(np.duration));
      else setNpTotal(0);
      if (np.timestamp) setNpStartedAt(new Date(np.timestamp).getTime());
      else setNpStartedAt(null);
      // topic comes from the sidecar on the current talk item
      const ci = live?.queue?.current_item || {};
      setNpTopic(type === "talk" ? (ci.topic || "") : "");
    }).catch(() => {});
  }, []);

  useEffect(() => { reloadShows(); refreshStatus(); }, []);
  useInterval(refreshStatus, 5000);
  useInterval(() => {
    if (npStartedAt) {
      const raw = Math.max(0, Math.floor((Date.now() - npStartedAt) / 1000));
      setElapsed(npTotal > 0 ? Math.min(raw, npTotal) : raw);
    }
  }, 1000);
  useEffect(() => {
    document.body.classList.toggle("dark-mode", dark);
    localStorage.setItem("crouchfm_dark", dark ? "1" : "0");
  }, [dark]);

  const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  const screens = {
    dashboard: <DashboardScreen t={t} onNav={setNav} npTopic={npTopic} npTitle={npTitle} npShow={npShow} npType={npType} elapsed={elapsed} npTotal={npTotal} />,
    live: <LiveScreen t={t} dark={dark} npTitle={npTitle} npShow={npShow} npTopic={npTopic} npType={npType} elapsed={elapsed} npTotal={npTotal} />,
    shows: <ShowsScreen t={t} shows={shows} reloadShows={reloadShows} />,
    hosts: <HostsScreen t={t} />,
    segments: <SegmentsScreen t={t} />,
    schedule: <ScheduleScreen t={t} shows={shows} />,
    generate: <GenerateScreen t={t} setStatus={setStatus} shows={shows} />,
    library: <LibraryScreen t={t} shows={shows} />,
    ondemand: <OnDemandScreen t={t} />,
    settings: <SettingsScreen t={t} />,
  };

  const stationName = shows ? (Object.keys(shows).length > 0 ? "Admin Console" : "Admin Console") : "Admin Console";

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: t.bg, fontFamily: "'DM Sans',sans-serif", overflow: "hidden" }}>
      <div style={{ flex: 1, minHeight: 0, display: "flex" }}>
        {/* Sidebar */}
        <div style={{ width: 220, flexShrink: 0, background: t.sidebarBg, borderRight: `1px solid ${t.sidebarBorder}`, display: "flex", flexDirection: "column", height: "100%" }}>
          {/* Logo */}
          <div style={{ padding: "18px 16px 14px", borderBottom: `1px solid ${t.sidebarBorder}`, flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 17, fontWeight: 700, color: t.text, letterSpacing: "-0.02em" }}>Crouch</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: t.accent, letterSpacing: "0.12em", textTransform: "uppercase" }}>FM</span>
            </div>
            <div style={{ fontSize: 11, color: t.textFaint, marginTop: 2, letterSpacing: "0.02em" }}>Admin Console</div>
          </div>

          {/* On Air */}
          <audio ref={audioRef} />
          <div style={{ margin: "10px 10px 2px", padding: "9px 12px", borderRadius: 8, flexShrink: 0,
            background: t.onAirBg, border: `1px solid ${t.onAirBorder}`, display: "flex", alignItems: "center", gap: 9 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: t.accent, flexShrink: 0, boxShadow: `0 0 8px ${t.accent}`, animation: "pulse 2s infinite" }} />
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 9.5, fontWeight: 700, color: t.accent, letterSpacing: "0.12em", textTransform: "uppercase" }}>
                {npType === "bumper" ? "Music" : "On Air"}
              </div>
              <div style={{ fontSize: 11.5, color: t.onAirTrack, marginTop: 2, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{npShow || "—"}</div>
              <ScrollText text={npType === "bumper" ? npTitle : (npTopic || npTitle)} style={{ fontSize: 11, color: t.textMuted, marginTop: 1 }} />
              {npTotal > 0 && <>
                <div style={{ height: 2, background: t.onAirBorder, borderRadius: 99, overflow: "hidden", marginTop: 5, marginBottom: 3 }}>
                  <div style={{ height: "100%", width: `${Math.min(100, Math.round((elapsed / npTotal) * 100))}%`, background: t.accent, borderRadius: 99, transition: "width 1s linear" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9.5, color: t.accent, fontFamily: "'DM Mono',monospace", opacity: 0.8 }}>
                  <span>{fmt(elapsed)}</span><span>{fmt(npTotal)}</span>
                </div>
              </>}
            </div>
            <button onClick={toggleListen} title={listening ? "Stop listening" : "Listen live"}
              style={{ flexShrink: 0, width: 26, height: 26, borderRadius: 6, border: `1px solid ${listening ? t.accent : t.onAirBorder}`,
                background: listening ? t.accent : "transparent", color: listening ? "#fff" : t.accent,
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>
              {listening
                ? <Ico d="M5 4h2v8H5zm4 0h2v8H9z" size={11} />
                : <Ico d="M5 3l10 5-10 5V3z" size={11} />}
            </button>
          </div>

          {/* Nav */}
          <div style={{ flex: 1, padding: "8px 8px", overflowY: "auto" }}>
            {NAV.map(item => (
              <NavItem key={item.id} item={item} active={nav === item.id} t={t} onClick={() => setNav(item.id)} />
            ))}
          </div>

          {/* Bottom */}
          <div style={{ padding: "10px 12px 14px", borderTop: `1px solid ${t.sidebarBorder}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
            <div style={{ fontSize: 11, color: t.textFaint, display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: icecastOk ? "#22c55e" : "#ef4444", display: "inline-block" }} />
              Icecast {icecastOk ? "online" : "offline"}
            </div>
            <button onClick={() => setDark(d => !d)} title={dark ? "Light mode" : "Dark mode"}
              style={{ width: 30, height: 30, borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Ico d={dark ? "M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4M8 5a3 3 0 100 6 3 3 0 000-6z" : "M8 3a5 5 0 000 10 6 6 0 01-1-11z"} size={14} />
            </button>
          </div>
        </div>

        {/* Main */}
        <div style={{ flex: 1, minWidth: 0, height: "100%", overflow: "hidden", display: "flex", flexDirection: "column" }}>
          {screens[nav] || <PlaceholderScreen t={t} title={NAV.find(n => n.id === nav)?.label} />}
        </div>
      </div>

      {/* Status Bar */}
      <div style={{ height: 28, flexShrink: 0, background: t.sidebarBg, borderTop: `1px solid ${t.sidebarBorder}`,
        display: "flex", alignItems: "center", paddingLeft: 16, paddingRight: 20, gap: 12, fontSize: 11.5, fontFamily: "'DM Mono',monospace" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, flex: 1, minWidth: 0 }}>
          {statusType === "running" && <Spinner size={10} color={t.accent} />}
          {statusType === "done" && <span style={{ color: "#22c55e", flexShrink: 0 }}>✓</span>}
          {statusType === "error" && <span style={{ color: t.dangerText, flexShrink: 0 }}>✕</span>}
          {statusType === "idle" && <span style={{ width: 6, height: 6, borderRadius: "50%", background: t.textFaint, display: "inline-block", flexShrink: 0 }} />}
          <span style={{ color: statusType === "running" ? t.accent : statusType === "done" ? "#22c55e" : statusType === "error" ? t.dangerText : t.textFaint, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {statusMsg}
          </span>
        </div>
        <span style={{ color: t.border }}>│</span>
        <div style={{ display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", overflow: "hidden", maxWidth: 320 }}>
          <span style={{ color: t.textFaint, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>▶ {npTitle}</span>
          {npTotal > 0 && <>
            <span style={{ color: t.textFaint, flexShrink: 0 }}>·</span>
            <span style={{ color: t.textFaint, flexShrink: 0, fontFamily: "'DM Mono',monospace" }}>{fmt(elapsed)}</span>
            <div style={{ width: 56, height: 3, background: t.border, borderRadius: 99, overflow: "hidden", flexShrink: 0 }}>
              <div style={{ height: "100%", width: `${Math.min(100, Math.round((elapsed / npTotal) * 100))}%`, background: t.accent, borderRadius: 99, transition: "width 1s linear" }} />
            </div>
            <span style={{ color: t.textFaint, flexShrink: 0, fontFamily: "'DM Mono',monospace" }}>{fmt(npTotal)}</span>
          </>}
        </div>
        <span style={{ color: t.border }}>│</span>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          {[["Icecast", icecastOk], ["Streamer", streamerOk]].map(([label, ok]) => (
            <span key={label} style={{ display: "flex", alignItems: "center", gap: 4, color: t.textFaint }}>
              <span style={{ width: 5, height: 5, borderRadius: "50%", background: ok ? "#22c55e" : "#ef4444", display: "inline-block" }} />
              {label}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<AdminShell />);
</script>
</body>
</html>
