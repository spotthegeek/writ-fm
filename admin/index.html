const NAV = [
  { id: "dashboard", label: "Dashboard", icon: "M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z" },

  { id: "library", label: "Library", icon: "M3 2h2v12H3zM7 2h2v12H7zM11 2l2 12" },

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function useApi(url, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const reload = useCallback(() => {
    if (!url) return;
    setLoading(true);
    fetch(url)
      .then(r => r.json())
      .then(d => { setData(d); setError(null); })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [url, ...deps]);
  useEffect(() => { reload(); }, [reload]);
  return [data, loading, error, reload];
}

function useInterval(fn, ms) {
  const ref = useRef(fn);
  useEffect(() => { ref.current = fn; }, [fn]);
  useEffect(() => {
    if (!ms) return;
    const id = setInterval(() => ref.current(), ms);
    return () => clearInterval(id);
  }, [ms]);
}

async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t || r.statusText); }
  return r.json().catch(() => ({}));
}

function fmtDuration(s) {
  if (!s && s !== 0) return "";
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function showsToList(showsObj) {
  if (!showsObj) return [];
  return Object.values(showsObj);
}

function showColor(showId, dark, active = false) {
  let h = 0;
  for (let i = 0; i < showId.length; i++) h = (h * 31 + showId.charCodeAt(i)) & 0xffff;
  const hue = h % 360;
  if (dark)   return active ? `oklch(0.52 0.14 ${hue})` : `oklch(0.37 0.10 ${hue})`;
  return               active ? `oklch(0.72 0.13 ${hue})` : `oklch(0.86 0.08 ${hue})`;
}

function fmtTime(isoStr) {
  if (!isoStr) return "";
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  } catch { return ""; }
}

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
const Ico = ({ d, size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d={d} />
  </svg>
);

const Pill = ({ label, bg, color }) => (
  <span style={{ background: bg, color, fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99 }}>{label}</span>
);

const StatusPill = ({ status, t }) => {
  const map = { ready: [t.pillReady, t.pillReadyText, "Ready"], queued: [t.pillQueued, t.pillQueuedText, "Queued"], new: [t.pillNew, t.pillNewText, "New"] };
  const [bg, color, label] = map[status] || map.ready;
  return <Pill label={label} bg={bg} color={color} />;
};

const Btn = ({ children, primary, danger, onClick, style = {}, disabled }) => {
  const [h, setH] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ padding: "7px 14px", borderRadius: 7, border: primary ? "none" : `1px solid transparent`, cursor: disabled ? "default" : "pointer",
        background: primary ? (h && !disabled ? "oklch(0.46 0.21 16)" : ACCENT) : danger ? (h ? "#fee2e2" : "transparent") : h ? "#f5f5f5" : "transparent",
        color: primary ? "#fff" : danger ? "#dc2626" : "inherit", opacity: disabled ? 0.5 : 1,
        fontSize: 13, fontWeight: primary ? 500 : 400, fontFamily: "'DM Sans', sans-serif",
        transition: "all 0.1s", display: "inline-flex", alignItems: "center", gap: 6, ...style }}>
      {children}
    </button>
  );
};

const Input = ({ t, style = {}, ...props }) => (
  <input {...props} style={{ background: t.inputBg, border: `1px solid ${t.inputBorder}`, borderRadius: 7, padding: "7px 11px",
    fontSize: 13, color: t.text, outline: "none", fontFamily: "'DM Sans', sans-serif", width: "100%", ...style }} />
);

const Select = ({ t, children, style = {}, ...props }) => (
  <select {...props} style={{ background: t.inputBg, border: `1px solid ${t.inputBorder}`, borderRadius: 7, padding: "7px 11px",
    fontSize: 13, color: t.text, outline: "none", fontFamily: "'DM Sans', sans-serif", width: "100%", ...style }}>
    {children}
  </select>
);

const Textarea = ({ t, style = {}, ...props }) => (
  <textarea {...props} style={{ background: t.inputBg, border: `1px solid ${t.inputBorder}`, borderRadius: 7, padding: "8px 11px",
    fontSize: 13, color: t.text, outline: "none", fontFamily: "'DM Sans', sans-serif", resize: "vertical", width: "100%", ...style }} />
);

const Label = ({ t, children }) => (
  <div style={{ fontSize: 11, fontWeight: 600, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 6 }}>{children}</div>
);

const Card = ({ t, children, style = {} }) => (
  <div style={{ background: t.cardBg, border: `1px solid ${t.cardBorder}`, borderRadius: 10, ...style }}>{children}</div>
);

const ScreenHeader = ({ t, title, subtitle, action }) => (
  <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20 }}>
    <div>
      <h1 style={{ fontSize: 20, fontWeight: 600, color: t.text, lineHeight: 1.2 }}>{title}</h1>
      {subtitle && <p style={{ fontSize: 13, color: t.textMuted, marginTop: 3 }}>{subtitle}</p>}
    </div>
    {action}
  </div>
);

const Spinner = ({ size = 14, color = "currentColor" }) => (
  <span style={{ width: size, height: size, borderRadius: "50%", border: `1.5px solid rgba(0,0,0,0.15)`, borderTopColor: color,
    animation: "spin 0.7s linear infinite", display: "inline-block", flexShrink: 0 }} />
);

const ScrollText = ({ text, style }) => {
  const outerRef = useRef(null);
  const innerRef = useRef(null);
  const [delta, setDelta] = useState(0);
  useEffect(() => {
    const measure = () => {
      if (!outerRef.current || !innerRef.current) return;
      setDelta(Math.max(0, innerRef.current.scrollWidth - outerRef.current.clientWidth));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(outerRef.current);
    return () => ro.disconnect();
  }, [text]);
  return (
    <div ref={outerRef} style={{ overflow: "hidden", whiteSpace: "nowrap", ...style }}>
      <span ref={innerRef} style={delta > 0
        ? { display: "inline-block", animation: `marquee-tick ${6 + delta / 18}s ease-in-out infinite`, "--scroll-delta": `-${delta}px` }
        : { display: "block", overflow: "hidden", textOverflow: "ellipsis" }}>
        {text}
      </span>
    </div>
  );
};

// ─── MODAL SHELL ──────────────────────────────────────────────────────────────
const Modal = ({ t, title, subtitle, onClose, tabs, activeTab, onTabChange, footer, children, width = "min(660px,94vw)" }) => (
  <div style={{ position: "fixed", inset: 0, background: t.modalOverlay, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}
    onClick={e => e.target === e.currentTarget && onClose()}>
    <div style={{ background: t.cardBg, border: `1px solid ${t.cardBorder}`, borderRadius: 14, width, maxHeight: "88vh",
      display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.18)" }}>
      <div style={{ padding: "20px 24px 0", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 17, fontWeight: 600, color: t.text }}>{title}</div>
            {subtitle && <div style={{ fontSize: 12.5, color: t.textMuted, marginTop: 3 }}>{subtitle}</div>}
          </div>
          <button onClick={onClose} style={{ width: 30, height: 30, borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
        </div>
        {tabs && (
          <div style={{ display: "flex", gap: 2, borderBottom: `1px solid ${t.border}` }}>
            {tabs.map(([id, label]) => (
              <button key={id} onClick={() => onTabChange(id)}
                style={{ padding: "6px 14px", border: "none", background: "transparent", cursor: "pointer", fontSize: 13,
                  fontWeight: activeTab === id ? 600 : 400, color: activeTab === id ? t.accent : t.textMuted,
                  borderBottom: activeTab === id ? `2px solid ${t.accent}` : "2px solid transparent",
                  marginBottom: -1, fontFamily: "'DM Sans', sans-serif" }}>
                {label}
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>{children}</div>
      {footer && <div style={{ padding: "14px 24px", borderTop: `1px solid ${t.border}`, flexShrink: 0 }}>{footer}</div>}
    </div>
  </div>
);

const ModalFooter = ({ t, onClose, onDelete, saveLabel = "Save", onSave, saving }) => {
  const [confirming, setConfirming] = useState(false);
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      {onDelete ? (
        confirming ? (
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 13, color: t.dangerText, fontWeight: 500 }}>Are you sure?</span>
            <button onClick={onDelete} style={{ padding: "5px 12px", borderRadius: 7, border: "none", background: t.dangerText, color: "#fff", fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Yes, delete</button>
            <button onClick={() => setConfirming(false)} style={{ padding: "5px 12px", borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.text, fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Cancel</button>
          </div>
        ) : (
          <button onClick={() => setConfirming(true)} style={{ padding: "7px 14px", borderRadius: 7, border: `1px solid ${t.dangerBg}`, background: "transparent", color: t.dangerText, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Delete</button>
        )
      ) : <div />}
      {!confirming && <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onClose} style={{ padding: "7px 14px", borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.text, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Cancel</button>
        <button onClick={onSave} disabled={saving} style={{ padding: "7px 18px", borderRadius: 7, border: "none", background: t.accent, color: "#fff", fontSize: 13, fontWeight: 500, cursor: saving ? "default" : "pointer", fontFamily: "'DM Sans', sans-serif", display: "flex", alignItems: "center", gap: 6, opacity: saving ? 0.7 : 1 }}>
          {saving && <Spinner size={12} color="#fff" />}{saveLabel}
        </button>
      </div>}
    </div>
  );
};

// ─── LIBRARY COMPONENTS ───────────────────────────────────────────────────────
const WaveBar = ({ t }) => (
  <div style={{ height: 28, display: "flex", alignItems: "center", gap: 2, background: t.border, borderRadius: 4, padding: "0 6px" }}>
    {[3,6,9,5,8,11,7,4,9,6,10,8,5,7,9,4,6,8].map((h, i) => (
      <div key={i} style={{ width: 2, height: h * 2, background: ACCENT, opacity: 0.3 + (i % 3) * 0.2, borderRadius: 1, flexShrink: 0 }} />
    ))}
  </div>
);

const LibRow = ({ item, t, shows, onDelete }) => {
  const [expanded, setExpanded] = useState(false);
  const [hov, setHov] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const audioRef = useRef(null);

  const audioUrl = `/api/library/audio/${item.show_id}/${encodeURIComponent(item.name)}?type=${item.type === "talk" ? "segment" : "bumper"}`;
  const showName = shows && shows[item.show_id] ? shows[item.show_id].name : item.show_id;
  const statusVal = item.play_count === 0 ? "new" : "ready";

  const togglePlay = (e) => {
    e.stopPropagation();
    if (!audioRef.current) return;
    if (playing) { audioRef.current.pause(); setPlaying(false); }
    else { audioRef.current.play(); setPlaying(true); }
  };

  const handleDelete = async (e) => {
    e.stopPropagation();
    if (!confirmDel) { setConfirmDel(true); return; }
    setDeleting(true);
    const kind = item.type === "talk" ? "segments" : "bumpers";
    try {
      await api("DELETE", `/api/library/${kind}/${item.show_id}/${encodeURIComponent(item.name)}`);
      onDelete && onDelete(item);
    } catch (err) {
      alert("Delete failed: " + err.message);
    } finally { setDeleting(false); setConfirmDel(false); }
  };

  const isTalk = item.type === "talk";

  return (
    <div style={{ borderBottom: `1px solid ${t.border}`, background: expanded ? t.rowExpanded : hov ? t.rowHover : "transparent", transition: "background 0.1s" }}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => { setHov(false); setConfirmDel(false); }}>
      <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 88px 64px 48px 72px 130px 24px", gap: 0, alignItems: "center", padding: "10px 16px", cursor: "pointer" }}
        onClick={() => setExpanded(e => !e)}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", color: isTalk ? t.accent : "oklch(0.52 0.18 232)" }}
          title={isTalk ? "Talk segment" : "Music bumper"}>
          <Ico d={isTalk
            ? "M8 1a3 3 0 013 3v4a3 3 0 01-6 0V4a3 3 0 013-3zM4 9a4 4 0 008 0M8 13v3M5 16h6"
            : "M6 3v7M6 3a2 2 0 014 0M6 10a2 2 0 104 0M10 3v7"} size={14} />
        </div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13.5, fontWeight: 500, color: t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {item.display_name || item.name.replace(/\.[^.]+$/, "")}
          </div>
          <div style={{ fontSize: 11.5, color: t.textMuted, marginTop: 1 }}>{showName} · {item.segment_type || "Music"}</div>
        </div>
        <div style={{ fontSize: 12, color: t.textMuted, fontFamily: "'DM Mono',monospace" }}>{item.duration_label || fmtDuration(item.duration_seconds)}</div>
        <div style={{ fontSize: 12, color: t.textFaint }}>{(item.created_label || "").slice(5, 10)}</div>
        <div style={{ fontSize: 12, color: t.textFaint, textAlign: "center" }}>{item.play_count}×</div>
        <div><StatusPill status={statusVal} t={t} /></div>
        <div style={{ opacity: hov || expanded ? 1 : 0, transition: "opacity 0.15s", display: "flex", gap: 2, alignItems: "center" }}>
          <button onClick={togglePlay} title="Preview" style={{ width: 26, height: 26, borderRadius: 6, border: "none", cursor: "pointer", background: playing ? t.navActiveBg : "transparent", color: playing ? t.accent : t.textFaint, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Ico d={playing ? "M4 2h3v12H4zM9 2h3v12H9z" : "M4 2l10 6-10 6z"} size={12} />
          </button>
          {confirmDel ? (
            <span style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <button onClick={handleDelete} style={{ padding: "2px 7px", borderRadius: 5, border: "none", background: t.dangerText, color: "#fff", fontSize: 11, cursor: "pointer" }}>
                {deleting ? "…" : "Yes"}
              </button>
              <button onClick={(e) => { e.stopPropagation(); setConfirmDel(false); }} style={{ padding: "2px 7px", borderRadius: 5, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 11, cursor: "pointer" }}>No</button>
            </span>
          ) : (
            <button onClick={handleDelete} title="Delete" style={{ width: 26, height: 26, borderRadius: 6, border: "none", cursor: "pointer", background: "transparent", color: t.textFaint, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Ico d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10" size={12} />
            </button>
          )}
        </div>
        <div style={{ color: t.textFaint, display: "flex", justifyContent: "center" }}>
          <Ico d={expanded ? "M4 10l4-4 4 4" : "M4 6l4 4 4-4"} size={12} />
        </div>
      </div>
      <audio ref={audioRef} src={audioUrl} onEnded={() => setPlaying(false)} style={{ display: "none" }} />
      <div style={{ overflow: "hidden", maxHeight: expanded ? 180 : 0, transition: "max-height 0.25s ease" }}>
        <div style={{ padding: "0 16px 14px 36px", display: "grid", gridTemplateColumns: "1fr 200px", gap: 14 }}>
          <div>

const OTHER_SEGMENT_TYPES = new Set(["show_intro", "show_outro", "station_id"]);

const LibraryScreen = ({ t, shows }) => {
  const [segData, , , reloadSegs] = useApi("/api/library/segments");
  const [bumperData, , , reloadBumpers] = useApi("/api/library/bumpers");
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showFilter, setShowFilter] = useState("");
  const [grouped, setGrouped] = useState(false);

  const allItems = React.useMemo(() => {
    const segs = Object.entries(segData || {}).flatMap(([, items]) => items.map(i => ({ ...i, type: "talk" })));
    const bumpers = Object.entries(bumperData || {}).flatMap(([, items]) => items.map(i => ({ ...i, type: "bumper" })));
    return [...segs, ...bumpers].sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
  }, [segData, bumperData]);

  const isOther = (i) => i.type === "talk" && OTHER_SEGMENT_TYPES.has(i.segment_type);

  const visible = allItems.filter(i => {
    if (showFilter && i.show_id !== showFilter) return false;
    if (filter === "talk" && (i.type !== "talk" || isOther(i))) return false;
    if (filter === "bumper" && i.type !== "bumper") return false;
    if (filter === "other" && !isOther(i)) return false;
    if (search) {
      const q = search.toLowerCase();
      return (i.name + i.show_id + (i.prompt || "") + (i.host_name || "")).toLowerCase().includes(q);
    }
    return true;
  });

  const handleDelete = (item) => {
    if (item.type === "talk") reloadSegs(); else reloadBumpers();
  };

  const tabs = [
    { id: "all", label: "All" },
    { id: "talk", label: "Talk Segments" },
    { id: "bumper", label: "Music Bumpers" },
    { id: "other", label: "Other" },
  ];

  const showList = shows ? Object.values(shows) : [];

  const groupedItems = React.useMemo(() => {
    if (!grouped) return null;
    const groups = {};
    visible.forEach(item => {
      if (!groups[item.show_id]) groups[item.show_id] = [];
      groups[item.show_id].push(item);
    });
    return Object.entries(groups).sort(([a], [b]) => {
      const na = (shows?.[a]?.name || a).toLowerCase();
      const nb = (shows?.[b]?.name || b).toLowerCase();
      return na.localeCompare(nb);
    });
  }, [grouped, visible, shows]);

  const emptyLabel = { all: "items", talk: "talk segments", bumper: "music bumpers", other: "other segments" }[filter] || "items";

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
      <div style={{ padding: "20px 24px 0", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div>
            <h1 style={{ fontSize: 20, fontWeight: 600, color: t.text }}>Library</h1>
            <p style={{ fontSize: 13, color: t.textMuted, marginTop: 3 }}>All talk segments and music bumpers · {allItems.length} items</p>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <select value={showFilter} onChange={e => setShowFilter(e.target.value)}
              style={{ height: 32, padding: "0 8px", borderRadius: 7, border: `1px solid ${showFilter ? t.accent : t.inputBorder}`, background: t.inputBg, color: showFilter ? t.text : t.textMuted, fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", outline: "none" }}>
              <option value="">All shows</option>
              {showList.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <button onClick={() => setGrouped(g => !g)} title={grouped ? "Switch to flat list" : "Group by show"}
              style={{ height: 32, padding: "0 10px", borderRadius: 7, border: `1px solid ${grouped ? t.accent : t.border}`, background: grouped ? t.navActiveBg : "transparent", color: grouped ? t.accent : t.textMuted, fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 5 }}>
              <Ico d="M2 4h12M2 8h8M2 12h10" size={13} />
              {grouped ? "Grouped" : "Group"}
            </button>
            <div style={{ position: "relative", display: "flex", alignItems: "center" }}>
              <span style={{ position: "absolute", left: 9, color: t.textFaint, pointerEvents: "none", display: "flex" }}>
                <Ico d="M7 13A6 6 0 107 1a6 6 0 000 12zM13 13l2 2" size={13} />
              </span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…"
                style={{ paddingLeft: 30, paddingRight: 10, height: 32, borderRadius: 7, border: `1px solid ${t.inputBorder}`, background: t.inputBg, color: t.text, fontSize: 13, outline: "none", fontFamily: "'DM Sans',sans-serif", width: 180 }} />
            </div>
            <button onClick={() => { reloadSegs(); reloadBumpers(); }}
              style={{ height: 32, padding: "0 12px", borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>↺ Refresh</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 2, borderBottom: `1px solid ${t.border}` }}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => setFilter(tb.id)}
              style={{ padding: "6px 14px", border: "none", background: "transparent", cursor: "pointer", fontSize: 13,
                fontWeight: filter === tb.id ? 600 : 400, color: filter === tb.id ? t.accent : t.textMuted,
                borderBottom: filter === tb.id ? `2px solid ${t.accent}` : "2px solid transparent",
                marginBottom: -1, transition: "color 0.1s", fontFamily: "'DM Sans',sans-serif" }}>
              {tb.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>
        <LibColHead t={t} />
        {visible.length === 0 ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "60px 24px", color: t.textFaint }}>
            <Ico d="M3 2h2v12H3zM7 2h2v12H7zM11 2l2 12" size={28} />
            <div style={{ fontSize: 14, fontWeight: 500, color: t.textMuted }}>No {emptyLabel} yet</div>
            <div style={{ fontSize: 13, color: t.textFaint }}>Generate some content to see it here.</div>
          </div>
        ) : grouped ? (
          groupedItems.map(([showId, items]) => {
            const showName = shows?.[showId]?.name || showId;
            return (
              <div key={showId}>
                <div style={{ padding: "7px 16px", background: t.sidebarBg, borderBottom: `1px solid ${t.border}`, fontSize: 11, fontWeight: 600, color: t.textFaint, letterSpacing: "0.07em", textTransform: "uppercase", display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ color: t.textMuted }}>{showName}</span>
                  <span style={{ fontWeight: 400 }}>{items.length} item{items.length !== 1 ? "s" : ""}</span>
                </div>
                {items.map(item => <LibRow key={`${item.show_id}/${item.name}`} item={item} t={t} shows={shows} onDelete={handleDelete} />)}
              </div>
            );
          })
        ) : visible.map(item => <LibRow key={`${item.show_id}/${item.name}`} item={item} t={t} shows={shows} onDelete={handleDelete} />)}
      </div>
    </div>
  );
};

// ─── GENERATE ─────────────────────────────────────────────────────────────────
const GenerateScreen = ({ t, setStatus, shows }) => {
  const [genType, setGenType] = useState("talk");
  const [tab, setTab] = useState("manual");
  const [opts] = useApi("/api/generate/options");
  const [schedStatus, , , reloadSched] = useApi("/api/scheduler/status");
  const [activityLog, , , reloadActivity] = useApi("/api/activity/log?limit=200");
  const [activityShowFilter, setActivityShowFilter] = useState("");
  const [activityLevelFilter, setActivityLevelFilter] = useState("");
  const [expandedJob, setExpandedJob] = useState(null);
  const [jobDetail, setJobDetail] = useState(null);

  const [form, setForm] = useState({ show_id: "", segment_type: "random", source_type: "", source_value: "", tts_backend: "", host_voice: "", count: 1, topic: "" });
  const [running, setRunning] = useState(false);
  const [log, setLog] = useState("Ready. Configure settings and click Generate.");
  const [jobId, setJobId] = useState(null);
  const pollRef = useRef(null);

  // Auto-generate trigger tracking
  const [triggerJobs, setTriggerJobs] = useState({}); // "showId|type" → jobId
  const [triggerLogs, setTriggerLogs] = useState({});  // jobId → log text
  const [triggerStatuses, setTriggerStatuses] = useState({}); // jobId → status
  const triggerPollRefs = useRef({});

  const showList = shows ? Object.values(shows) : [];
  const selectedShow = form.show_id ? shows?.[form.show_id] : showList[0];
  const effectiveShowId = form.show_id || (showList[0]?.id || showList[0]?.id);

  useEffect(() => {
    if (showList.length && !form.show_id) setForm(f => ({ ...f, show_id: showList[0]?.id }));
  }, [showList.length]);

  const pollJob = useCallback(async (id) => {
    try {
      const job = await api("GET", `/api/generate/jobs/${id}`);
      const lines = job.log || [];
      setLog(lines.join("\n") || "Starting…");
      setStatus(lines[lines.length - 1] || "Running…", "running");
      if (job.status === "completed" || job.status === "failed") {
        clearInterval(pollRef.current);
        setRunning(false);
        setStatus(job.status === "completed" ? "Generation complete" : "Generation failed", job.status === "completed" ? "done" : "error");
      }
    } catch (e) {
      clearInterval(pollRef.current);
      setRunning(false);
    }
  }, []);

  const generate = async () => {
    setRunning(true);
    setLog("Starting…");
    setStatus("Starting generation…", "running");
    try {
      const payload = {
        show_id: effectiveShowId,
        content_type: genType,
        segment_type: genType === "music" ? "random" : (form.segment_type || "random"),
        source_type: form.source_type || "",
        source_value: form.source_value || "",
        count: parseInt(form.count) || 1,
        tts_backend: form.tts_backend || "",
        host_voice: form.host_voice || "",
        topic: form.topic || "",
      };
      const res = await api("POST", "/api/generate", payload);
      setJobId(res.job_id);
      pollRef.current = setInterval(() => pollJob(res.job_id), 2000);
    } catch (e) {
      setLog("Error: " + e.message);
      setRunning(false);
      setStatus("Generation failed", "error");
    }
  };

  useEffect(() => () => clearInterval(pollRef.current), []);
  useEffect(() => () => Object.values(triggerPollRefs.current).forEach(clearInterval), []);

  const triggerJob = useCallback(async (showId, type) => {
    const key = `${showId}|${type}`;
    const showName = shows?.[showId]?.name || showId;
    setStatus(`Generating ${type} for ${showName}…`, "running");
    let res;
    try {
      res = await api("POST", `/api/scheduler/trigger/${showId}/${type}`);
    } catch (e) {
      setStatus("Trigger failed: " + e.message, "error");
      return;
    }
    const jid = res.job_id;
    if (!jid) { reloadSched(); return; }
    setTriggerJobs(j => ({ ...j, [key]: jid }));
    setTriggerLogs(l => ({ ...l, [jid]: "Starting…" }));
    setTriggerStatuses(s => ({ ...s, [jid]: "running" }));
    const poll = setInterval(async () => {
      try {
        const job = await api("GET", `/api/generate/jobs/${jid}`);
        setTriggerLogs(l => ({ ...l, [jid]: (job.log || []).join("\n") || "Starting…" }));
        setTriggerStatuses(s => ({ ...s, [jid]: job.status }));
        if (job.status === "completed" || job.status === "failed") {
          clearInterval(poll);
          delete triggerPollRefs.current[jid];
          setStatus(job.status === "completed" ? `${type === "talk" ? "Talk" : "Music"} generation complete` : `Generation failed for ${showName}`, job.status === "completed" ? "done" : "error");
          setTriggerJobs(j => { const n = {...j}; delete n[key]; return n; });
          reloadSched();
        }
      } catch { clearInterval(poll); delete triggerPollRefs.current[jid]; }
    }, 2000);
    triggerPollRefs.current[jid] = poll;
  }, [shows]);

  const tabs = [{ id: "manual", label: "Manual Generate" }, { id: "schedules", label: "Auto-Generate" }, { id: "activity", label: "Activity Log" }];

  const backendVoices = (backend) => {
    if (!opts) return [];
    if (backend === "kokoro") return opts.kokoro_voices || [];
    if (backend === "minimax") return opts.minimax_voices || [];
    if (backend === "google") return opts.google_voices || [];
    return [];
  };

  const effectiveBackend = form.tts_backend || selectedShow?.tts_backend || "kokoro";
  const voices = backendVoices(effectiveBackend);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
      <div style={{ padding: "20px 24px 0", flexShrink: 0 }}>
        <h1 style={{ fontSize: 20, fontWeight: 600, color: t.text, marginBottom: 14 }}>Generate</h1>
        <div style={{ display: "flex", gap: 2, borderBottom: `1px solid ${t.border}`, marginBottom: 0 }}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => setTab(tb.id)}
              style={{ padding: "6px 14px", border: "none", background: "transparent", cursor: "pointer", fontSize: 13,
                fontWeight: tab === tb.id ? 600 : 400, color: tab === tb.id ? t.accent : t.textMuted,
                borderBottom: tab === tb.id ? `2px solid ${t.accent}` : "2px solid transparent",
                marginBottom: -1, fontFamily: "'DM Sans',sans-serif" }}>
              {tb.label}
            </button>
          ))}
        </div>
      </div>

      {tab === "manual" && (
        <div style={{ flex: 1, overflowY: "auto", padding: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignContent: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card t={t} style={{ padding: "18px 18px" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>Content Settings</div>
              <div style={{ marginBottom: 14 }}>
                <Label t={t}>Content Type</Label>
                <div style={{ display: "flex", gap: 6 }}>
                  {["talk", "bumper"].map(type => (
                    <button key={type} onClick={() => setGenType(type)}
                      style={{ flex: 1, padding: "7px 0", borderRadius: 7, border: `1px solid ${genType === type ? t.accent : t.border}`,
                        background: genType === type ? t.navActiveBg : "transparent", color: genType === type ? t.accent : t.textMuted,
                        fontSize: 13, fontWeight: genType === type ? 600 : 400, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", transition: "all 0.1s" }}>
                      {type === "talk" ? "Talk Segment" : "Music Bumper"}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <Label t={t}>Show</Label>
                <Select t={t} value={form.show_id} onChange={e => setForm(f => ({ ...f, show_id: e.target.value }))}>
                  {showList.map(s => <option key={s.id} value={s.id}>{s.name || s.id}</option>)}
                </Select>
              </div>
              {genType === "talk" ? (
                <>
                  <div style={{ marginBottom: 12 }}>
                    <Label t={t}>Segment Type</Label>
                    <Select t={t} value={form.segment_type} onChange={e => setForm(f => ({ ...f, segment_type: e.target.value }))}>
                      <option value="random">Random (from show's types)</option>
                      {(opts?.segment_types || []).map(st => <option key={st} value={st}>{st}</option>)}
                    </Select>
                  </div>
                  <div>
                    <Label t={t}>Source</Label>
                    <div style={{ display: "grid", gridTemplateColumns: "140px 1fr", gap: 6 }}>
                      <Select t={t} value={form.source_type} onChange={e => setForm(f => ({ ...f, source_type: e.target.value, source_value: "" }))}>
                        <option value="">None</option>
                        <option value="url">Web URL</option>
                        <option value="reddit">Reddit</option>
                        <option value="youtube">YouTube</option>
                      </Select>
                      <Input t={t} value={form.source_value} onChange={e => setForm(f => ({ ...f, source_value: e.target.value }))} placeholder={form.source_type === "reddit" ? "/r/subreddit" : form.source_type === "youtube" ? "YouTube URL" : "Paste a URL"} />
                    </div>
                  </div>
                </>
              ) : (
                <div>
                  <Label t={t}>Style Prompt</Label>
                  <Textarea t={t} rows={3} value={form.topic} onChange={e => setForm(f => ({ ...f, topic: e.target.value }))} placeholder="e.g. Brian Eno ambient, slow evolving organ tones, late night silence" />
                  <div style={{ fontSize: 11.5, color: t.textFaint, marginTop: 6 }}>Leave blank to use show's curated style pool · Generated via MiniMax music-2.6</div>
                </div>
              )}
            </Card>

            <Card t={t} style={{ padding: "18px 18px" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 14 }}>Hosts & TTS</div>
              <div style={{ marginBottom: 12 }}>
                <Label t={t}>TTS Backend</Label>
                <Select t={t} value={form.tts_backend} onChange={e => setForm(f => ({ ...f, tts_backend: e.target.value, host_voice: "" }))}>
                  <option value="">Use show default</option>
                  <option value="kokoro">Kokoro (local)</option>
                  <option value="minimax">MiniMax (cloud)</option>
                  <option value="google">Google Gemini (cloud)</option>
                </Select>
              </div>
              <div>
                <Label t={t}>Host Voice Override</Label>
                <Select t={t} value={form.host_voice} onChange={e => setForm(f => ({ ...f, host_voice: e.target.value }))}>
                  <option value="">Use show default</option>
                  {voices.map(v => <option key={v} value={v}>{v}</option>)}
                </Select>
              </div>
            </Card>

            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div style={{ flex: 1 }}><Label t={t} style={{ marginBottom: 4 }}>Count</Label></div>
              <Input t={t} type="number" value={form.count} onChange={e => setForm(f => ({ ...f, count: e.target.value }))} min="1" max="10" style={{ width: 70 }} />
            </div>

            <button onClick={generate} disabled={running}
              style={{ padding: "11px 0", borderRadius: 8, border: "none", background: running ? t.border : t.accent,
                color: running ? t.textMuted : "#fff", fontSize: 14, fontWeight: 600, cursor: running ? "default" : "pointer",
                fontFamily: "'DM Sans',sans-serif", transition: "all 0.15s", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              {running ? (<><Spinner size={14} color={t.textMuted} /> Generating…</>) : "↻ Generate Content"}
            </button>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card t={t} style={{ padding: "18px 18px", flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em" }}>Generation Log</div>
                {running && <Pill label="Running" bg={t.pillQueued} color={t.pillQueuedText} />}
              </div>
              <div style={{ background: t.logBg, borderRadius: 7, padding: "12px 14px", height: 320, overflowY: "auto",
                fontSize: 12, fontFamily: "'DM Mono',monospace", color: t.logText, whiteSpace: "pre-wrap", lineHeight: 1.7 }}>
                {log}
              </div>
            </Card>
          </div>
        </div>
      )}

      {tab === "schedules" && (
        <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
          <p style={{ fontSize: 13, color: t.textMuted, marginBottom: 16 }}>The scheduler checks inventory every 5 minutes and generates when below the minimum. Edit enabled/disabled and thresholds via Shows → Automation tab.</p>

          {/* Active trigger job logs */}
          {Object.entries(triggerJobs).map(([key, jid]) => {
            const [showId, type] = key.split("|");
            const showName = shows?.[showId]?.name || showId;
            const logText = triggerLogs[jid] || "Starting…";
            const jobStatus = triggerStatuses[jid] || "running";
            return (
              <Card t={t} key={key} style={{ padding: "16px 20px", marginBottom: 12, borderColor: t.accent }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: t.text }}>
                    {showName} — {type === "talk" ? "Talk Segments" : "Music Bumpers"}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {jobStatus === "running" && <><Spinner size={12} color={t.accent} /><Pill label="Generating" bg={t.pillQueued} color={t.pillQueuedText} /></>}
                    {jobStatus === "completed" && <Pill label="Complete" bg={t.pillReady} color={t.pillReadyText} />}
                    {jobStatus === "failed" && <Pill label="Failed" bg={t.pillLive} color={t.pillLiveText} />}
                  </div>
                </div>
                <div ref={el => el && (el.scrollTop = el.scrollHeight)}
                  style={{ background: t.logBg, borderRadius: 6, padding: "10px 12px", fontSize: 11.5, fontFamily: "'DM Mono',monospace", color: t.logText, whiteSpace: "pre-wrap", lineHeight: 1.7, maxHeight: 220, overflowY: "auto" }}>
                  {logText}
                </div>
              </Card>
            );
          })}

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {Object.entries(schedStatus?.shows || {}).map(([showId, ss]) => {
              const show = shows?.[showId];
              const talkCfg = ss.talk || {};
              const musicCfg = ss.music || {};
              const talkBackoff = talkCfg.in_backoff;
              const musicBackoff = musicCfg.in_backoff;
              const isTalkRunning = !!triggerJobs[`${showId}|talk`];
              const isMusicRunning = !!triggerJobs[`${showId}|music`];
              return (
                <Card t={t} key={showId} style={{ padding: "16px 20px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{show?.name || showId}</div>
                      {talkCfg.enabled && <Pill label="Talk on" bg={t.pillReady} color={t.pillReadyText} />}
                      {musicCfg.enabled && <Pill label="Music on" bg={t.pillQueued} color={t.pillQueuedText} />}
                      {!talkCfg.enabled && !musicCfg.enabled && <Pill label="Disabled" bg={t.border} color={t.textFaint} />}
                      {(talkBackoff || musicBackoff) && <Pill label="Backoff" bg={t.pillNew} color={t.pillNewText} />}
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => !isTalkRunning && triggerJob(showId, "talk")} disabled={isTalkRunning}
                        style={{ padding: "5px 12px", borderRadius: 7, border: "none", background: isTalkRunning ? t.border : t.accent, color: isTalkRunning ? t.textMuted : "#fff", fontSize: 12, cursor: isTalkRunning ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 5, transition: "all 0.15s" }}>
                        {isTalkRunning ? <><Spinner size={11} color={t.textMuted} /> Generating…</> : "↺ Talk"}
                      </button>
                      <button onClick={() => !isMusicRunning && triggerJob(showId, "music")} disabled={isMusicRunning}
                        style={{ padding: "5px 12px", borderRadius: 7, border: `1px solid ${isMusicRunning ? t.border : t.border}`, background: isMusicRunning ? t.sidebarBg : "transparent", color: isMusicRunning ? t.textMuted : t.text, fontSize: 12, cursor: isMusicRunning ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 5, transition: "all 0.15s" }}>
                        {isMusicRunning ? <><Spinner size={11} color={t.textMuted} /> Generating…</> : "↺ Music"}
                      </button>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: 10 }}>
                    {[["Talk", talkCfg.inventory, talkCfg.min_inventory, talkBackoff], ["Music", musicCfg.inventory, musicCfg.min_inventory, musicBackoff]].map(([label, inv, min, backoff]) => (
                      <React.Fragment key={label}>
                        <div>
                          <div style={{ fontSize: 11, color: t.textFaint, marginBottom: 4 }}>{label} inventory</div>
                          <div style={{ fontSize: 16, fontWeight: 600, color: (inv < min) ? t.dangerText : t.text }}>{inv ?? "—"}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, color: t.textFaint, marginBottom: 4 }}>{label} min</div>
                          <div style={{ fontSize: 16, fontWeight: 600, color: t.text }}>{min ?? "—"}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, color: t.textFaint, marginBottom: 4 }}>Status</div>
                          <div style={{ fontSize: 12, color: backoff ? t.pillNewText : t.textMuted }}>
                            {backoff ? "In backoff" : inv < min ? "Below min" : "OK"}
                          </div>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  {(talkCfg.last_failure || musicCfg.last_failure) && (
                    <div style={{ marginTop: 10, padding: "7px 10px", borderRadius: 6, background: t.dangerBg, fontSize: 11.5, color: t.dangerText }}>
                      Last failure: {[talkCfg.last_failure && `Talk ${talkCfg.last_failure.slice(11,16)}`, musicCfg.last_failure && `Music ${musicCfg.last_failure.slice(11,16)}`].filter(Boolean).join(" · ")}
                    </div>
                  )}
                </Card>
              );
            })}
            {!schedStatus && <div style={{ fontSize: 13, color: t.textFaint }}>Loading scheduler status…</div>}
          </div>
        </div>
      )}

      {tab === "activity" && (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
          <div style={{ padding: "16px 24px 12px", flexShrink: 0, display: "flex", gap: 8, alignItems: "center", borderBottom: `1px solid ${t.border}` }}>
            <select value={activityShowFilter} onChange={e => setActivityShowFilter(e.target.value)}
              style={{ height: 30, padding: "0 8px", borderRadius: 7, border: `1px solid ${activityShowFilter ? t.accent : t.inputBorder}`, background: t.inputBg, color: activityShowFilter ? t.text : t.textMuted, fontSize: 12.5, fontFamily: "'DM Sans',sans-serif", outline: "none" }}>
              <option value="">All shows</option>
              {(shows ? Object.values(shows) : []).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <select value={activityLevelFilter} onChange={e => setActivityLevelFilter(e.target.value)}
              style={{ height: 30, padding: "0 8px", borderRadius: 7, border: `1px solid ${activityLevelFilter ? t.accent : t.inputBorder}`, background: t.inputBg, color: activityLevelFilter ? t.text : t.textMuted, fontSize: 12.5, fontFamily: "'DM Sans',sans-serif", outline: "none" }}>
              <option value="">All levels</option>
              <option value="error">Errors only</option>
              <option value="info">Info only</option>
            </select>
            <div style={{ flex: 1 }} />
            <span style={{ fontSize: 12, color: t.textFaint }}>{(activityLog || []).length} entries</span>
            <button onClick={reloadActivity} style={{ height: 30, padding: "0 10px", borderRadius: 7, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>↺ Refresh</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>
            {/* Job detail expansion */}
            {expandedJob && jobDetail && (
              <div style={{ margin: "12px 24px", borderRadius: 8, border: `1px solid ${t.border}`, overflow: "hidden" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", background: t.sidebarBg, borderBottom: `1px solid ${t.border}` }}>
                  <span style={{ fontSize: 12.5, fontWeight: 600, color: t.text }}>Job {expandedJob} · {jobDetail.show_id} · {jobDetail.status}</span>
                  <button onClick={() => { setExpandedJob(null); setJobDetail(null); }} style={{ fontSize: 12, color: t.textFaint, background: "transparent", border: "none", cursor: "pointer" }}>✕ Close</button>
                </div>
                <div style={{ background: t.logBg, padding: "12px 14px", fontFamily: "'DM Mono',monospace", fontSize: 11.5, color: t.logText, whiteSpace: "pre-wrap", lineHeight: 1.7, maxHeight: 300, overflowY: "auto" }}>
                  {(jobDetail.log || []).join("\n") || "No log output."}
                </div>
              </div>
            )}
            {(activityLog || [])
              .filter(e => (!activityShowFilter || e.show_id === activityShowFilter) && (!activityLevelFilter || e.level === activityLevelFilter))
              .map((e, i) => {
                const isErr = e.level === "error";
                const srcColor = { manual: "oklch(0.52 0.18 232)", scheduler: "oklch(0.52 0.14 150)", history: t.textFaint }[e.source] || t.textFaint;
                const hasJob = !!e.job_id;
                const isExpanded = expandedJob === e.job_id;
                return (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "90px 90px 50px 60px 1fr auto", gap: 0, alignItems: "center", padding: "7px 24px", borderBottom: `1px solid ${t.border}`, background: isErr ? (isExpanded ? t.dangerBg : "transparent") : "transparent" }}
                    onMouseEnter={e2 => e2.currentTarget.style.background = isErr ? t.dangerBg : t.rowHover}
                    onMouseLeave={e2 => e2.currentTarget.style.background = isErr ? "transparent" : "transparent"}>
                    <span style={{ fontSize: 11, color: t.textFaint, fontFamily: "'DM Mono',monospace" }}>{e.ts.slice(5)}</span>
                    <span style={{ fontSize: 11.5, color: t.textMuted, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{shows?.[e.show_id]?.name || e.show_id}</span>
                    <span style={{ fontSize: 10.5, color: t.textFaint }}>{e.type}</span>
                    <span style={{ fontSize: 10.5, color: srcColor, fontWeight: 600 }}>{e.source}</span>
                    <span style={{ fontSize: 12, color: isErr ? t.dangerText : t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.msg}</span>
                    {hasJob && (
                      <button onClick={async () => {
                        if (isExpanded) { setExpandedJob(null); setJobDetail(null); return; }
                        try {
                          const detail = await api("GET", `/api/generate/jobs/${e.job_id}`);
                          setJobDetail(detail); setExpandedJob(e.job_id);
                        } catch { setExpandedJob(e.job_id); setJobDetail({ log: ["Could not load job detail."], show_id: e.show_id, status: "?" }); }
                      }} style={{ fontSize: 11, color: t.accent, background: "transparent", border: "none", cursor: "pointer", whiteSpace: "nowrap", padding: "2px 6px" }}>
                        {isExpanded ? "▲ hide" : "▼ log"}
                      </button>
                    )}
                  </div>
                );
              })}
            {!(activityLog || []).filter(e => (!activityShowFilter || e.show_id === activityShowFilter) && (!activityLevelFilter || e.level === activityLevelFilter)).length && (
              <div style={{ padding: "40px 24px", textAlign: "center", fontSize: 13, color: t.textFaint }}>No activity entries match the current filter.</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── SHOWS ────────────────────────────────────────────────────────────────────
const ShowModal = ({ show, t, onClose, onSaved, segmentTypes, hosts }) => {
  const isNew = !show?.id;
  const [tab, setTab] = useState("basics");
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    id: show?.id || "",
    name: show?.name || "",
    description: show?.description || "",
    tts_backend: show?.tts_backend || "kokoro",
    bumper_style: show?.bumper_style || "ambient",
    segment_types: show?.segment_types || [],
    generation: show?.generation || { talk: { enabled: true, min_inventory: 6, target_inventory: 12, cadence: "continuous" }, music: { enabled: true, min_inventory: 4, target_inventory: 8, cadence: "weekly" } },
    content_lifecycle: show?.content_lifecycle || {},
    hosts: show?.hosts || [],
  });

  const toggleSegType = (id) => {
    setForm(f => ({ ...f, segment_types: f.segment_types.includes(id) ? f.segment_types.filter(x => x !== id) : [...f.segment_types, id] }));
  };

  const save = async () => {
    setSaving(true);
    try {
      const body = {
        name: form.name, description: form.description, tts_backend: form.tts_backend,
        bumper_style: form.bumper_style, segment_types: form.segment_types,
        hosts: form.hosts.length ? form.hosts : [{ id: "liminal_operator", role: "primary" }],
        research_sources: show?.research_sources || [], source_rules: show?.source_rules || [],
        guests: [], playback_sequence: {}, content_lifecycle: form.content_lifecycle,
        generation: form.generation,
      };
      if (isNew) {
        await api("POST", `/api/shows?show_id=${encodeURIComponent(form.id)}`, body);
      } else {
        await api("PUT", `/api/shows/${show.id}`, body);
      }
      onSaved();
    } catch (e) { alert(e.message); }
    finally { setSaving(false); }
  };

  const del = async () => {
    try { await api("DELETE", `/api/shows/${show.id}`); onSaved(); }
    catch (e) { alert(e.message); }
  };

  const talkGen = form.generation?.talk || {};
  const musicGen = form.generation?.music || {};
  const setTalkGen = (key, val) => setForm(f => ({ ...f, generation: { ...f.generation, talk: { ...talkGen, [key]: val } } }));
  const setMusicGen = (key, val) => setForm(f => ({ ...f, generation: { ...f.generation, music: { ...musicGen, [key]: val } } }));

  return (
    <Modal t={t} title={isNew ? "New Show" : `Edit · ${show.name}`} subtitle="Use tabs to keep metadata and automation settings separate."
      onClose={onClose} tabs={[["basics", "Basics"], ["content", "Content & Hosts"], ["automation", "Automation"]]}
      activeTab={tab} onTabChange={setTab}
      footer={<ModalFooter t={t} onClose={onClose} onDelete={isNew ? null : del} saveLabel={isNew ? "Create Show" : "Save Show"} onSave={save} saving={saving} />}
      width="min(680px,94vw)">
      {tab === "basics" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {isNew && <div><Label t={t}>Show ID (slug)</Label><Input t={t} value={form.id} onChange={e => setForm(f => ({ ...f, id: e.target.value }))} placeholder="my_show" /></div>}
          <div style={{ display: "grid", gridTemplateColumns: isNew ? "1fr" : "1fr 1fr", gap: 12 }}>
            <div><Label t={t}>Display Name</Label><Input t={t} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} /></div>
            {!isNew && <div><Label t={t}>Show ID</Label><Input t={t} value={show.id} disabled style={{ opacity: 0.5 }} /></div>}
          </div>
          <div><Label t={t}>Description</Label><Textarea t={t} rows={3} value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><Label t={t}>Default TTS Backend</Label>
              <Select t={t} value={form.tts_backend} onChange={e => setForm(f => ({ ...f, tts_backend: e.target.value }))}>
                <option value="kokoro">Kokoro (local)</option><option value="minimax">MiniMax (cloud)</option><option value="google">Google Gemini (cloud)</option>
              </Select>
            </div>
            <div><Label t={t}>Bumper Style</Label>
              <Input t={t} value={form.bumper_style} onChange={e => setForm(f => ({ ...f, bumper_style: e.target.value }))} placeholder="ambient" />
            </div>
          </div>
        </div>
      )}
      {tab === "content" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <Label t={t}>Segment Types</Label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {Object.entries(segmentTypes || {}).map(([id, st]) => {
                const active = form.segment_types.includes(id);
                return (
                  <button key={id} onClick={() => toggleSegType(id)}
                    style={{ padding: "5px 12px", borderRadius: 7, border: `1px solid ${active ? t.accent : t.border}`,
                      background: active ? t.navActiveBg : "transparent", color: active ? t.accent : t.textMuted,
                      fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                    {st.name || id}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <Label t={t}>Hosts</Label>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {form.hosts.map((h, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, border: `1px solid ${t.border}` }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: t.navActiveBg, color: t.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600 }}>{(h.id || h.display_name || "?")[0].toUpperCase()}</div>
                  <span style={{ fontSize: 13, color: t.text, flex: 1 }}>{h.display_name || h.id} <span style={{ color: t.textFaint }}>({h.role})</span></span>
                  <button onClick={() => setForm(f => ({ ...f, hosts: f.hosts.filter((_, j) => j !== i) }))} style={{ fontSize: 12, color: t.textFaint, background: "transparent", border: "none", cursor: "pointer" }}>Remove</button>
                </div>
              ))}
              {form.hosts.length === 0 && <div style={{ fontSize: 13, color: t.textFaint }}>No hosts assigned.</div>}
              <Select t={t} onChange={e => {
                const id = e.target.value;
                if (id && !form.hosts.find(h => h.id === id)) {
                  setForm(f => ({ ...f, hosts: [...f.hosts, { id, role: f.hosts.length === 0 ? "primary" : "co-host" }] }));
                  e.target.value = "";
                }
              }}>
                <option value="">+ Add host…</option>
                {Object.entries(hosts || {}).map(([id, h]) => <option key={id} value={id}>{h.name || id}</option>)}
              </Select>
            </div>
          </div>
        </div>
      )}
      {tab === "automation" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <Label t={t} style={{ marginBottom: 0 }}>Talk Segments — Auto-Generate</Label>
              <button onClick={() => setTalkGen("enabled", !talkGen.enabled)}
                style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 7,
                  border: `1px solid ${talkGen.enabled ? t.accent : t.border}`,
                  background: talkGen.enabled ? t.navActiveBg : "transparent",
                  color: talkGen.enabled ? t.accent : t.textMuted,
                  fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: talkGen.enabled ? t.accent : t.textFaint, display: "inline-block" }} />
                {talkGen.enabled ? "Enabled" : "Disabled"}
              </button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, opacity: talkGen.enabled ? 1 : 0.45 }}>
              {[["Min inventory", "min_inventory"], ["Target", "target_inventory"], ["Cadence", "cadence"]].map(([lbl, key]) => (

const Timeline12h = ({ t, upcoming, overrideShowId, dark, style = {} }) => {
  if (!upcoming || upcoming.length === 0) return null;

  // Total duration in ms for width proportions
  const starts = upcoming.map(b => new Date(b.start).getTime());
  const ends   = upcoming.map(b => new Date(b.end).getTime());
  const totalMs = ends[ends.length - 1] - starts[0];
  if (totalMs <= 0) return null;

  return (
    <Card t={t} style={{ padding: "14px 18px", ...style }}>
      <div style={{ fontSize: 10.5, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>
        Next 12 Hours
      </div>
      {/* Bar */}
      <div style={{ display: "flex", height: 44, gap: 2, borderRadius: 7, overflow: "hidden" }}>
        {upcoming.map((block, i) => {
          const durationMs = new Date(block.end).getTime() - new Date(block.start).getTime();
          const pct = (durationMs / totalMs) * 100;
          const isFirst = i === 0;
          const isOverride = block.is_override;
          const bg = showColor(block.show_id, dark, isFirst);
          const shadow = isFirst ? "inset 0 3px 0 rgba(255,255,255,0.18)" : "none";
          const textAlpha = isFirst ? (dark ? "rgba(255,255,255,0.92)" : "rgba(0,0,0,0.72)") : (dark ? "rgba(255,255,255,0.65)" : "rgba(0,0,0,0.50)");
          return (
            <div key={i} title={`${block.name} · ${fmtTime(block.start)} – ${fmtTime(block.end)}`}
              style={{ flex: `${pct} 0 0`, minWidth: 0, background: bg, boxShadow: shadow,
                borderRadius: i === 0 ? "5px 0 0 5px" : i === upcoming.length - 1 ? "0 5px 5px 0" : 0,
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                overflow: "hidden", position: "relative", cursor: "default" }}>
              {pct > 8 && (
                <span style={{ fontSize: 10, fontWeight: isFirst ? 700 : 600, color: textAlpha,
                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "90%",
                  letterSpacing: "0.04em" }}>
                  {block.name}
                </span>
              )}
              {isFirst && (
                <span style={{ fontSize: 8, fontWeight: 700, color: isOverride ? (dark ? "rgba(255,200,100,0.9)" : "rgba(160,80,0,0.85)") : (dark ? "rgba(255,255,255,0.45)" : "rgba(0,0,0,0.32)"),
                  letterSpacing: "0.10em", marginTop: 2 }}>
                  {isOverride ? "OVERRIDE" : "ON AIR"}
                </span>
              )}
            </div>
          );
        })}
      </div>
      {/* Time labels */}
      <div style={{ display: "flex", marginTop: 5, position: "relative", height: 14 }}>
        {upcoming.map((block, i) => {
          const durationMs = new Date(block.end).getTime() - new Date(block.start).getTime();
          const pct = (durationMs / totalMs) * 100;
          return (
            <div key={i} style={{ flex: `${pct} 0 0`, minWidth: 0, display: "flex", justifyContent: i === upcoming.length - 1 ? "flex-end" : "flex-start" }}>
              <span style={{ fontSize: 9.5, color: t.textFaint, fontFamily: "'DM Mono',monospace", whiteSpace: "nowrap" }}>
                {fmtTime(i === upcoming.length - 1 ? block.end : block.start)}
              </span>
            </div>
          );
        })}
      </div>
    </Card>
  );
};

const KIND_META = {
  speech:     { label: "Talk",       micD: "M8 1a3 3 0 013 3v4a3 3 0 01-6 0V4a3 3 0 013-3zM5 9a3 3 0 006 0M8 12v3" },
  bumper_slot:{ label: "Music",      micD: "M3 9a2 2 0 104 0 2 2 0 00-4 0zM11 7a2 2 0 104 0 2 2 0 00-4 0zM7 9V3l6-2v6" },
  intro:      { label: "Intro",      micD: "M5 3l7 5-7 5V3zM14 3v10" },
  outro:      { label: "Outro",      micD: "M11 3l-7 5 7 5V3zM2 3v10" },
  station_id: { label: "Station ID", micD: "M8 8m-1 0a1 1 0 102 0 1 1 0 10-2 0M5 5a4 4 0 006 0M3 3a7 7 0 0010 0M5 11a4 4 0 006 0M3 13a7 7 0 0010 0" },
};

const LiveScreen = ({ t, dark, npTitle, npShow, npTopic, npType, elapsed, npTotal }) => {
  const [liveStatus, , , reloadLive] = useApi("/api/live/status");
  useInterval(reloadLive, 5000);
  const [skipping, setSkipping] = useState(false);
  const [dragFile, setDragFile] = useState(null);
  const [dropFile, setDropFile] = useState(null);
  const [optimisticItems, setOptimisticItems] = useState(null);
  const prevCurrentFile = useRef(null);

  const queue = liveStatus?.queue || {};
  const currentItem = queue.current_item;
  const currentFile = currentItem?.filename ?? null;
  const displayQueue = queue.display_queue || [];
  const upcoming = liveStatus?.upcoming || [];

  // Match current item by filename (current_item.index is the speak-index in main_segments,
  // which differs from display_queue indices that include intro/bumper/outro slots)
  const currentDqPos = displayQueue.findIndex(i => i.filename === currentFile);
  const serverVisibleItems = currentDqPos >= 0 ? displayQueue.slice(currentDqPos) : displayQueue;

  // Clear optimistic state only when the playing segment actually changes (not every poll)
  useEffect(() => {
    if (currentFile && currentFile !== prevCurrentFile.current) {
      prevCurrentFile.current = currentFile;
      setOptimisticItems(null);
    }
  }, [currentFile]);

  const visibleItems = optimisticItems || serverVisibleItems;
  const upcomingSpeech = visibleItems.filter(
    item => item.kind === "speech" && item.actionable && item.filename !== currentFile
  );

  const isTalk = npType === "talk" || !npType;
  const progPct = npTotal > 0 ? Math.round((elapsed / npTotal) * 100) : 0;

  const skip = async () => {
    setSkipping(true);
    try { await api("POST", "/api/live/skip"); reloadLive(); }
    catch (e) { alert(e.message); }
    finally { setSkipping(false); }
  };

  const handleDrop = async (targetFile) => {
    if (!dragFile || !targetFile || dragFile === targetFile) { setDragFile(null); setDropFile(null); return; }
    const order = upcomingSpeech.map(i => i.filename);
    const fromPos = order.indexOf(dragFile);
    const toPos = order.indexOf(targetFile);
    if (fromPos < 0 || toPos < 0) { setDragFile(null); setDropFile(null); return; }
    const newOrder = [...order];
    const [moved] = newOrder.splice(fromPos, 1);
    newOrder.splice(toPos, 0, moved);

    // Optimistic: immediately reorder the visible list, replacing speech items in-place
    const speechMap = new Map(upcomingSpeech.map(i => [i.filename, i]));
    const ordered = newOrder.map(f => speechMap.get(f)).filter(Boolean);
    let si = 0;
    setOptimisticItems(serverVisibleItems.map(item =>
      (item.kind === "speech" && item.actionable && item.filename !== currentFile)
        ? { ...(ordered[si++] || item), _pending: true } : item
    ));

    setDragFile(null); setDropFile(null);
    try {
      await api("POST", "/api/live/control", { action: "reorder", order: newOrder });
      reloadLive();
    } catch (e) {
      alert(e.message);
      setOptimisticItems(null);
    }
  };

  const kindColor = (kind) => kind === "speech" ? t.accent : kind === "bumper_slot" ? "oklch(0.52 0.18 232)" : t.textFaint;

  return (
    <div style={{ padding: 24, overflowY: "auto", height: "100%" }}>
      <ScreenHeader t={t} title="Live Control" subtitle="Manage the live queue and current program"
        action={<Btn t={t} danger onClick={skip} disabled={skipping}>{skipping ? "Skipping…" : "Skip Current"}</Btn>} />
      <ShowOverridePanel t={t} onOverride={reloadLive} style={{ marginBottom: 14 }} />
      <Timeline12h t={t} upcoming={upcoming} dark={dark} style={{ marginBottom: 14 }} />
      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 14, alignItems: "start" }}>

        {/* Current Program */}
        <Card t={t} style={{ padding: "16px 18px" }}>
          <div style={{ fontSize: 10.5, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Now Playing</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: t.textMuted, marginBottom: 3 }}>{npShow || "—"}</div>
          <div style={{ fontSize: 13, fontWeight: 500, color: t.text, marginBottom: 14, lineHeight: 1.4 }}>
            {isTalk ? (npTopic || npTitle) : (npTitle || "Music Bumper")}
          </div>
          <div style={{ height: 3, background: t.border, borderRadius: 99, overflow: "hidden", marginBottom: 6 }}>
            <div style={{ height: "100%", width: `${progPct}%`, background: t.accent, borderRadius: 99, transition: "width 1s linear" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: t.textFaint }}>
            {npTotal > 0
              ? <><span>{fmtDuration(elapsed)}</span><span>{fmtDuration(npTotal)}</span></>
              : <span>—</span>}
          </div>
        </Card>

        {/* Queue */}
        <Card t={t} style={{ padding: "18px 20px", minWidth: 0, overflow: "hidden" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textFaint, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 12 }}>
            Up Next · {upcomingSpeech.length} segments
          </div>
          {visibleItems.length === 0 && <div style={{ fontSize: 13, color: t.textFaint }}>Queue is empty.</div>}
          {visibleItems.map((item, i) => {
            const isNowPlaying = item.filename === currentFile;
            const isPending = !!item._pending;
            const km = KIND_META[item.kind] || KIND_META.speech;
            const isDraggable = item.kind === "speech" && item.actionable && !isNowPlaying;
            const isDropTarget = dropFile === item.filename && dragFile !== item.filename;
            const isSmall = item.kind !== "speech";
            const title = item.topic || (item.kind === "bumper_slot" ? "Music Bumper" : item.name || item.label);
            const dur = item.duration_seconds ? fmtDuration(item.duration_seconds) : "";

            return (
              <div key={item.index ?? i}
                draggable={isDraggable}
                onDragStart={isDraggable ? () => setDragFile(item.filename) : undefined}
                onDragOver={isDraggable ? e => { e.preventDefault(); setDropFile(item.filename); } : undefined}
                onDragLeave={isDraggable ? () => setDropFile(f => f === item.filename ? null : f) : undefined}
                onDrop={isDraggable ? () => handleDrop(item.filename) : undefined}
                onDragEnd={() => { setDragFile(null); setDropFile(null); }}
                style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: isSmall ? "5px 0" : "9px 0",
                  borderTop: i > 0 ? `1px solid ${isDropTarget ? t.accent : t.border}` : "none",
                  opacity: dragFile === item.filename ? 0.4 : isPending ? 0.65 : 1,
                  cursor: isDraggable ? "grab" : "default",
                  transition: "border-color 0.1s, opacity 0.2s",
                  borderLeft: isPending ? `2px dashed ${t.textFaint}` : "2px solid transparent",
                  paddingLeft: isPending ? 6 : 0,
                }}>
                {/* Type icon */}
                <span style={{ width: 22, height: 22, borderRadius: 5, background: isNowPlaying ? t.accent : `${kindColor(item.kind)}22`,
                  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Ico d={km.micD} size={11} color={isNowPlaying ? "#fff" : kindColor(item.kind)} />
                </span>
                {/* Content */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: isSmall ? 11.5 : 13, fontWeight: isSmall ? 400 : 500, color: isNowPlaying ? t.accent : t.text,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {title}
                  </div>
                  {!isSmall && <div style={{ fontSize: 11, color: t.textMuted }}>{km.label}{item.segment_type && item.segment_type !== "bumper" ? ` · ${item.segment_type}` : ""}</div>}
                </div>
                {/* Duration */}
                {dur && <span style={{ fontSize: 11, color: t.textFaint, fontFamily: "'DM Mono',monospace", flexShrink: 0 }}>{dur}</span>}
                {/* Playing indicator, pending badge, or drag handle */}
                {isNowPlaying
                  ? <span style={{ fontSize: 9, fontWeight: 700, color: t.accent, letterSpacing: "0.08em", flexShrink: 0 }}>ON AIR</span>
                  : isPending
                    ? <span style={{ fontSize: 9, fontWeight: 600, color: t.textFaint, letterSpacing: "0.06em", flexShrink: 0, opacity: 0.7 }}>PENDING</span>
                    : isDraggable
                      ? <span style={{ color: t.textFaint, flexShrink: 0, userSelect: "none", opacity: 0.5 }}>⠿</span>
                      : null}
              </div>
            );
          })}
        </Card>
      </div>
    </div>
  );
};

              <div><Label t={t}>Description</Label><Input t={t} value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} /></div>
